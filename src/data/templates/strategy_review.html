<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>策略评估 - StockExpert</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system,'PingFang SC','Microsoft YaHei',sans-serif;
         background: #0d1117; color: #e6edf3; font-size: 14px; }

  header { background: #161b22; border-bottom: 1px solid #30363d; padding: 14px 24px;
           display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  h1 { font-size: 18px; font-weight: 600; color: #58a6ff; }
  .tab-nav { display: flex; gap: 4px; }
  .tab-link { background: #21262d; color: #8b949e; border: 1px solid #30363d;
              border-radius: 6px; padding: 5px 14px; font-size: 13px; cursor: pointer;
              text-decoration: none; }
  .tab-link:hover { color: #e6edf3; }
  .tab-link.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }

  .toolbar { display: flex; gap: 10px; padding: 16px 24px; align-items: center; flex-wrap: wrap; }
  select, button, input { background: #21262d; color: #e6edf3; border: 1px solid #30363d;
                         border-radius: 6px; padding: 5px 12px; font-size: 13px; }
  input[type="date"] { width: 140px; }
  button { background: #238636; border-color: #238636; cursor: pointer; }
  button:hover { background: #2ea043; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 0 24px 16px; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px;
          overflow: hidden; }
  .card-header { background: #21262d; padding: 10px 16px; font-size: 13px;
                 font-weight: 600; border-bottom: 1px solid #30363d; }
  .card-body { padding: 12px 16px; }

  table { width: 100%; border-collapse: collapse; }
  th { background: #21262d; color: #8b949e; font-size: 11px; text-align: left;
       padding: 7px 12px; border-bottom: 1px solid #30363d; font-weight: 400; }
  td { padding: 8px 12px; border-bottom: 1px solid #21262d; font-size: 13px; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #1c2128; }
  .num { font-variant-numeric: tabular-nums; }
  .bar-cell { display: flex; align-items: center; gap: 8px; }
  .bar-bg { flex: 1; height: 6px; background: #30363d; border-radius: 3px; }
  .bar-fill { height: 6px; border-radius: 3px; background: #238636; }

  .conclusion { background: #161b22; border: 1px solid #30363d; border-radius: 8px;
                padding: 16px; margin: 0 24px 16px; font-size: 14px; line-height: 1.6; }
  .conclusion-icon { font-size: 16px; margin-right: 6px; }

  .suggestions { list-style: none; }
  .suggestions li { padding: 5px 0; border-bottom: 1px solid #21262d; display: flex;
                    align-items: flex-start; gap: 8px; }
  .suggestions li:last-child { border-bottom: none; }
  .suggestions li::before { content: '💡'; flex-shrink: 0; }

  .loading { text-align: center; padding: 40px; color: #484f58; }
</style>
</head>
<body>
<header>
  <h1>📊 StockExpert</h1>
  <nav class="tab-nav">
    <a class="tab-link" href="/">数据看板</a>
    <a class="tab-link" href="/trade-log">交易日志</a>
    <a class="tab-link active" href="/strategy-review">策略评估</a>
    <a class="tab-link" href="/orchestrator">编排器</a>
  </nav>
</header>

<div class="toolbar">
  <input type="date" id="filter-start">
  <input type="date" id="filter-end">
  <button onclick="loadReview()">🔍 分析</button>
</div>

<div id="content">
  <div class="loading">点击「分析」按钮获取策略评估结果</div>
</div>

<script>
async function loadReview() {
  const params = new URLSearchParams();
  const start = document.getElementById('filter-start').value;
  const end = document.getElementById('filter-end').value;
  if (start) params.set('start_date', start);
  if (end) params.set('end_date', end);

  document.getElementById('content').innerHTML = '<div class="loading">分析中...</div>';

  const [reviewRes, summaryRes] = await Promise.all([
    fetch('/api/strategy/review?' + params.toString()).then(r => r.json()),
    fetch('/api/strategy/summary').then(r => r.json()),
  ]);

  render(reviewRes, summaryRes);
}

function render(review, summary) {
  const s = review.summary || {};
  const winRate = (s.win_rate || 0) * 100;
  const winRateColor = winRate >= 60 ? '#3fb950' : winRate >= 40 ? '#d29922' : '#f85149';

  let html = `
  <div class="grid-2">
    <div class="card">
      <div class="card-header">📈 总体统计</div>
      <div class="card-body">
        <table>
          <tr><td>总交易次数</td><td class="num">${s.total_trades || 0}</td></tr>
          <tr><td>盈利次数</td><td class="num" style="color:#3fb950">${s.win_trades || 0}</td></tr>
          <tr><td>亏损次数</td><td class="num" style="color:#f85149">${s.loss_trades || 0}</td></tr>
          <tr><td>胜率</td>
            <td class="num" style="color:${winRateColor}">
              ${winRate.toFixed(0)}%
              <div class="bar-cell">
                <div class="bar-bg"><div class="bar-fill" style="width:${winRate}%;background:${winRateColor}"></div></div>
              </div>
            </td>
          </tr>
          <tr><td>平均盈亏</td><td class="num">${(s.avg_pnl || 0).toFixed(2)}%</td></tr>
          <tr><td>平均盈利</td><td class="num" style="color:#3fb950">+${(s.avg_win || 0).toFixed(2)}%</td></tr>
          <tr><td>平均亏损</td><td class="num" style="color:#f85149">${(s.avg_loss || 0).toFixed(2)}%</td></tr>
          <tr><td>盈亏比</td><td class="num">${(s.profit_loss_ratio || 0).toFixed(2)}</td></tr>
        </table>
      </div>
    </div>
    <div class="card">
      <div class="card-header">📊 交易摘要（来自日志）</div>
      <div class="card-body">
        <table>
          <tr><td>总记录</td><td class="num">${summary.total || 0}</td></tr>
          <tr><td>持仓中</td><td class="num" style="color:#58a6ff">${summary.holding || 0}</td></tr>
          <tr><td>已平仓</td><td class="num">${summary.closed || 0}</td></tr>
          <tr><td>胜率（已平仓）</td><td class="num">${summary.win_rate ? (summary.win_rate*100).toFixed(0)+'%' : '-'}</td></tr>
          <tr><td>盈利次数</td><td class="num" style="color:#3fb950">${summary.win_count || 0}</td></tr>
          <tr><td>亏损次数</td><td class="num" style="color:#f85149">${summary.loss_count || 0}</td></tr>
        </table>
      </div>
    </div>
  </div>`;

  // 形态分析
  const pats = review.pattern_analysis || {};
  if (Object.keys(pats).length) {
    html += `<div class="grid-2">
    <div class="card">
      <div class="card-header">🎯 按形态分析</div>
      <div class="card-body">
        <table>
          <thead><tr><th>形态</th><th>次数</th><th>胜率</th><th>平均盈亏</th></tr></thead>
          <tbody>`;
    for (const [p, d] of Object.entries(pats)) {
      const wr = (d.win_rate || 0) * 100;
      html += `<tr>
        <td>${p}</td>
        <td class="num">${d.trades}</td>
        <td class="num">${wr.toFixed(0)}%</td>
        <td class="num" style="color:${d.avg_pnl>=0?'#3fb950':'#f85149'}">${d.avg_pnl>=0?'+':''}${d.avg_pnl.toFixed(2)}%</td>
      </tr>`;
    }
    html += `</tbody></table></div></div>`;
  }

  // 板块分析
  const secs = review.sector_analysis || {};
  if (Object.keys(secs).length) {
    html += `<div class="card">
      <div class="card-header">🏭 按板块分析</div>
      <div class="card-body">
        <table>
          <thead><tr><th>板块</th><th>次数</th><th>胜率</th><th>平均盈亏</th></tr></thead>
          <tbody>`;
    for (const [sec, d] of Object.entries(secs)) {
      const wr = (d.win_rate || 0) * 100;
      html += `<tr>
        <td>${sec}</td>
        <td class="num">${d.trades}</td>
        <td class="num">${wr.toFixed(0)}%</td>
        <td class="num" style="color:${d.avg_pnl>=0?'#3fb950':'#f85149'}">${d.avg_pnl>=0?'+':''}${d.avg_pnl.toFixed(2)}%</td>
      </tr>`;
    }
    html += `</tbody></table></div>`;
  }

  // 结论
  if (review.conclusion) {
    html += `<div class="conclusion">
      <span class="conclusion-icon">📋</span>
      <strong>评估结论：</strong>${review.conclusion}
    </div>`;
  }

  // 建议
  const suggs = review.suggestions || [];
  if (suggs.length) {
    html += `<div class="card" style="margin: 0 24px 16px;">
      <div class="card-header">💡 优化建议</div>
      <div class="card-body">
        <ul class="suggestions">${suggs.map(s => `<li>${s}</li>`).join('')}</ul>
      </div>
    </div>`;
  }

  document.getElementById('content').innerHTML = html;
}
</script>
</body>
</html>
